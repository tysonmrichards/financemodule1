    // ─── CONSTANTS ─────────────────────────────────────────────────────

    const XP_QUICK_STRIKE = 10;
    const XP_CHALLENGE = 15;
    const XP_BOSS = 50;
    const LEVEL_THRESHOLDS = [0,100,250,450,700,1000,1400,1900,2500,3200];

    function getLevel(xp) {
      for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
        if (xp >= LEVEL_THRESHOLDS[i]) return i + 1;
      }
      return 1;
    }
    function getXPForNext(xp) {
      const lvl = getLevel(xp);
      if (lvl >= LEVEL_THRESHOLDS.length) return { current: xp, needed: xp, pct: 100 };
      const base = LEVEL_THRESHOLDS[lvl - 1];
      const next = LEVEL_THRESHOLDS[lvl] || base + 500;
      return { current: xp - base, needed: next - base, pct: Math.min(100, ((xp - base) / (next - base)) * 100) };
    }

    const ENCOURAGING = ["\u2694\uFE0F Critical Hit!", "\u{1F525} Fire Streak!", "\u{1F48E} Legendary!", "\u{1F31F} Brilliant!", "\u26A1 Shocking Power!", "\u{1F3C6} Champion Move!"];
    const WRONG_MSG = ["The enemy deflected! But you gained intel:", "A miss! But you learned something:", "Blocked! Here's the secret:", "Dodged! But now you know:"];

    // ─── ICON COMPONENT ─────────────────────────────────────────────────

    function Icon({ name, size = 16, className = "" }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = "";
          const el = lucide.createElement(lucide.icons[name]);
          el.setAttribute("width", size);
          el.setAttribute("height", size);
          if (className) el.setAttribute("class", className);
          ref.current.appendChild(el);
        }
      }, [name, size, className]);
      return React.createElement("span", { ref, className: "icon inline-flex items-center" });
    }

    // ─── XP BAR ─────────────────────────────────────────────────────────

    function XPBar({ xp }) {
      const info = getXPForNext(xp);
      const level = getLevel(xp);
      return (
        <div className="flex items-center gap-3" style={{minWidth:180}}>
          <div className="flex items-center gap-1.5">
            <Icon name="Crown" size={14} />
            <span className="font-medieval text-yellow-400 text-sm">Lv.{level}</span>
          </div>
          <div className="flex-1">
            <div className="hp-bar" style={{height:8}}>
              <div className="hp-fill" style={{width:`${info.pct}%`, background:'linear-gradient(90deg,#f59e0b,#fbbf24)'}} />
            </div>
          </div>
          <span className="font-mono text-xs text-yellow-300">{xp} XP</span>
        </div>
      );
    }

    // ─── TOP BAR ────────────────────────────────────────────────────────

    function TopBar({ xp, screen, onBack }) {
      return (
        <div className="top-bar">
          <div className="flex items-center gap-3">
            {screen !== 'map' && (
              <button onClick={onBack} className="text-yellow-400 hover:text-yellow-300 transition-colors cursor-pointer" style={{background:'none',border:'none'}}>
                <Icon name="ArrowLeft" size={20} />
              </button>
            )}
            <h1 className="font-medieval text-yellow-400 text-lg">{"\u2694\uFE0F"} Level Up Academy</h1>
          </div>
          <XPBar xp={xp} />
        </div>
      );
    }

    // ─── STAR FIELD ─────────────────────────────────────────────────────

    function StarField() {
      const stars = useRef(
        Array.from({length:50},(_,i)=>({
          id:i,
          left:`${Math.random()*100}%`,
          top:`${Math.random()*100}%`,
          delay:`${Math.random()*3}s`,
          size: Math.random()*2+1
        }))
      );
      return (
        <div className="stars-bg">
          {stars.current.map(s=>(
            <div key={s.id} className="star-dot anim-sparkle" style={{left:s.left,top:s.top,animationDelay:s.delay,width:s.size,height:s.size,opacity:0.4+Math.random()*0.4}} />
          ))}
        </div>
      );
    }

    // ─── QUEST MAP ──────────────────────────────────────────────────────

    function QuestMap({ zones, completedQuests, completedBosses, onSelectQuest, onSelectBoss, xp }) {
      const level = getLevel(xp);
      const totalQuests = zones.reduce((a,z)=>a+z.quests.length,0);
      const doneQuests = completedQuests.size;
      const pct = Math.round((doneQuests/totalQuests)*100);

      return (
        <div className="anim-fade p-4 max-w-3xl mx-auto pb-24">
          <div className="text-center mb-6 mt-4">
            <h2 className="font-medieval text-3xl text-yellow-400 mb-1 anim-float">{WORLD_NAME}</h2>
            <p className="text-gray-400 text-sm">{SUBJECT} — Unit 1: Income & Expense</p>
            <div className="mt-3 flex items-center justify-center gap-4 text-xs text-gray-400">
              <span>{"\u{1F5E1}\uFE0F"} Level {level}</span>
              <span>{"\u{1F4DC}"} {doneQuests}/{totalQuests} Quests</span>
              <span>{"\u{1F3C6}"} {pct}% Complete</span>
            </div>
            <div className="mt-2 mx-auto" style={{maxWidth:300}}>
              <div className="hp-bar" style={{height:6}}>
                <div className="hp-fill" style={{width:`${pct}%`,background:'linear-gradient(90deg,#22c55e,#4ade80)'}} />
              </div>
            </div>
          </div>

          {zones.map((zone, zi) => {
            const zoneQuests = zone.quests;
            const allDone = zoneQuests.every(q=>completedQuests.has(q.id));
            const bossDefeated = completedBosses.has(zone.id);
            const isLocked = zi > 0 && !completedBosses.has(zones[zi-1].id);
            const zoneDoneQuests = zoneQuests.filter(q=>completedQuests.has(q.id)).length;

            return (
              <div key={zone.id} className={`card-zone mb-4 p-4 ${isLocked ? 'opacity-40' : ''}`} style={{borderColor: allDone ? zone.color+'40' : undefined}}>
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-2xl">{zone.icon}</span>
                  <div className="flex-1">
                    <h3 className="font-medieval text-lg" style={{color: zone.color}}>{zone.name}</h3>
                    <p className="text-xs text-gray-400">{zone.subtitle}</p>
                  </div>
                  {isLocked && <Icon name="Lock" size={20} />}
                  {bossDefeated && <span className="text-yellow-400">{"\u{1F3C6}"}</span>}
                  <span className="text-xs font-mono text-gray-400">{zoneDoneQuests}/{zoneQuests.length}</span>
                </div>

                {!isLocked && (
                  <div className="space-y-2">
                    {zoneQuests.map(quest => {
                      const done = completedQuests.has(quest.id);
                      return (
                        <button key={quest.id} onClick={()=>onSelectQuest(zone, quest)}
                          className="w-full flex items-center gap-3 p-3 rounded-lg transition-all text-left cursor-pointer"
                          style={{background: done ? 'rgba(34,197,94,0.1)' : 'rgba(30,25,45,0.5)', border: `1px solid ${done ? 'rgba(34,197,94,0.2)' : 'rgba(255,255,255,0.05)'}`}}>
                          {done ? <span className="text-green-400">{"\u2714"}</span> : <span className="text-gray-400">{"\u{1F4DC}"}</span>}
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-semibold truncate">{quest.title}</p>
                            <p className="text-xs text-gray-400 truncate">{quest.topic}</p>
                          </div>
                          <Icon name="ChevronRight" size={14} />
                        </button>
                      );
                    })}

                    {allDone && (
                      <button onClick={()=>onSelectBoss(zone)}
                        className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all text-left cursor-pointer ${bossDefeated ? '' : 'hover:border-red-400'}`}
                        style={{background: bossDefeated ? 'rgba(120,80,0,0.2)' : 'rgba(120,20,20,0.2)', border: `1px solid ${bossDefeated ? 'rgba(200,160,50,0.2)' : 'rgba(239,68,68,0.3)'}`}}>
                        {bossDefeated
                          ? <span className="text-yellow-400">{"\u{1F3C6}"}</span>
                          : <span className="text-red-400 anim-float">{"\u2694\uFE0F"}</span>}
                        <div className="flex-1">
                          <p className="text-sm font-semibold" style={{color: bossDefeated ? '#fbbf24' : '#f87171'}}>{"\u2694\uFE0F"} Boss: {zone.bossName}</p>
                          <p className="text-xs text-gray-400">{bossDefeated ? 'Defeated!' : 'All quests complete \u2014 battle awaits!'}</p>
                        </div>
                        <Icon name="ChevronRight" size={14} />
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── QUEST SCREEN ────────────────────────────────────────────────────

    function QuestScreen({ quest, zone, onComplete, onBack }) {
      const [phase, setPhase] = useState('scroll');
      const [challengeIdx, setChallengeIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [earned, setEarned] = useState(0);
      const [streak, setStreak] = useState(0);
      const [showXPPop, setShowXPPop] = useState(null);
      const [shaking, setShaking] = useState(false);

      const currentQ = phase === 'quickstrike' ? quest.quickStrike
        : phase === 'challenge' ? quest.challenges[challengeIdx] : null;

      const handleAnswer = (idx) => {
        if (showResult) return;
        setSelected(idx);
        setShowResult(true);
        const isCorrect = idx === currentQ.correct;
        if (isCorrect) {
          const pts = phase === 'quickstrike' ? XP_QUICK_STRIKE : XP_CHALLENGE;
          setEarned(e=>e+pts);
          setStreak(s=>s+1);
          setShowXPPop(`+${pts} XP`);
          setTimeout(()=>setShowXPPop(null), 1000);
        } else {
          setStreak(0);
          setShaking(true);
          setTimeout(()=>setShaking(false), 300);
        }
      };

      const handleNext = () => {
        setSelected(null);
        setShowResult(false);
        if (phase === 'scroll') setPhase('quickstrike');
        else if (phase === 'quickstrike') { setPhase('challenge'); setChallengeIdx(0); }
        else if (phase === 'challenge') {
          if (challengeIdx < quest.challenges.length - 1) setChallengeIdx(i=>i+1);
          else setPhase('done');
        }
      };

      if (phase === 'done') {
        return (
          <div className="anim-fade p-6 max-w-xl mx-auto text-center mt-12">
            <div className="anim-level-up mb-6"><span className="text-6xl">{"\u{1F3C6}"}</span></div>
            <h2 className="font-medieval text-2xl text-yellow-400 mb-2">Quest Complete!</h2>
            <p className="text-gray-300 mb-4">You conquered "{quest.title}"</p>
            <div className="card-dark p-4 mb-6 inline-block">
              <p className="font-mono text-yellow-400 text-xl">+{earned} XP Earned</p>
            </div>
            <br/>
            <button className="btn-gold mt-4" onClick={()=>onComplete(earned)}>Return to Map</button>
          </div>
        );
      }

      return (
        <div className={`anim-fade p-4 max-w-xl mx-auto mt-4 ${shaking?'anim-shake':''}`}>
          {showXPPop && <div className="xp-popup anim-xp font-medieval text-yellow-400 text-2xl font-bold">{showXPPop}</div>}
          <div className="flex items-center gap-2 mb-4">
            <span className="text-lg">{zone.icon}</span>
            <div>
              <h3 className="font-medieval text-lg" style={{color:zone.color}}>{quest.title}</h3>
              <p className="text-xs text-gray-400">{quest.topic}</p>
            </div>
          </div>
          {streak >= 3 && <div className="text-center mb-3 anim-streak font-medieval text-lg text-orange-400">{"\u{1F525}"} {streak} Streak! Fire Mode!</div>}
          <div className="flex items-center justify-center gap-1.5 mb-5">
            <div className={`w-2.5 h-2.5 rounded-full ${phase==='scroll'?'bg-yellow-400':'bg-green-400'}`} />
            <div className={`w-2.5 h-2.5 rounded-full ${phase==='quickstrike'?'bg-yellow-400':phase==='challenge'||phase==='done'?'bg-green-400':'bg-gray-600'}`} />
            {quest.challenges.map((_,i)=>(
              <div key={i} className={`w-2.5 h-2.5 rounded-full ${phase==='challenge'&&challengeIdx===i?'bg-yellow-400':phase==='challenge'&&challengeIdx>i?'bg-green-400':'bg-gray-600'}`} />
            ))}
          </div>

          {phase === 'scroll' && (
            <div className="anim-slide">
              <div className="scroll-bg p-5 mb-4">
                <div className="flex items-center gap-2 mb-3">
                  <Icon name="BookOpen" size={18} />
                  <span className="font-medieval text-yellow-600 text-sm">Scroll of Knowledge</span>
                </div>
                <p className="text-gray-200 leading-relaxed">{quest.scroll}</p>
              </div>
              <button className="btn-gold w-full" onClick={handleNext}>I've Read the Scroll — Onward! {"\u2694\uFE0F"}</button>
            </div>
          )}

          {(phase === 'quickstrike' || phase === 'challenge') && currentQ && (
            <div className="anim-slide">
              <div className="card-dark p-4 mb-4">
                <div className="flex items-center gap-2 mb-3">
                  <Icon name={phase==='quickstrike'?'Zap':'Target'} size={16} />
                  <span className="font-medieval text-sm" style={{color:phase==='quickstrike'?'#fbbf24':'#22d3ee'}}>
                    {phase === 'quickstrike' ? 'Quick Strike!' : `Challenge ${challengeIdx+1}/${quest.challenges.length}`}
                  </span>
                </div>
                <p className="text-gray-100 text-lg mb-4">{currentQ.question}</p>
                <div className="space-y-2">
                  {currentQ.options.map((opt, i) => {
                    let cls = 'option-btn';
                    if (showResult) {
                      if (i === currentQ.correct) cls += ' option-correct';
                      else if (i === selected) cls += ' option-wrong';
                    }
                    return (
                      <button key={i} className={cls} onClick={()=>handleAnswer(i)} disabled={showResult}>
                        <span className="font-mono text-xs text-gray-500 mr-2">{String.fromCharCode(65+i)}.</span>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              </div>
              {showResult && (
                <div className="anim-slide">
                  <div className={`p-4 rounded-lg mb-4 ${selected===currentQ.correct ? 'bg-green-900/30 border border-green-500/30' : 'bg-red-900/30 border border-red-500/30'}`} style={{borderWidth:1,borderStyle:'solid',borderColor:selected===currentQ.correct?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)',background:selected===currentQ.correct?'rgba(20,80,30,0.3)':'rgba(80,20,20,0.3)'}}>
                    {selected === currentQ.correct
                      ? <p style={{color:'#86efac'}}><span className="font-bold">{ENCOURAGING[Math.floor(Math.random()*ENCOURAGING.length)]}</span> {currentQ.explanation}</p>
                      : <p style={{color:'#fca5a5'}}><span className="font-bold">{WRONG_MSG[Math.floor(Math.random()*WRONG_MSG.length)]}</span> {currentQ.explanation}</p>}
                  </div>
                  <button className="btn-gold w-full" onClick={handleNext}>
                    {phase==='challenge' && challengeIdx===quest.challenges.length-1 ? 'Complete Quest! \u{1F3C6}' : 'Next \u2694\uFE0F'}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── BOSS SCREEN ─────────────────────────────────────────────────────

    function BossScreen({ zone, onComplete, onBack }) {
      const [qIdx, setQIdx] = useState(0);
      const [bossHP, setBossHP] = useState(zone.bossHP);
      const [playerScore, setPlayerScore] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [phase, setPhase] = useState('intro');
      const [bossHit, setBossHit] = useState(false);
      const [showXPPop, setShowXPPop] = useState(null);
      const [wrongCount, setWrongCount] = useState(0);

      const totalQ = zone.bossQuestions.length;
      const currentQ = zone.bossQuestions[qIdx];
      const hpPct = (bossHP / zone.bossHP) * 100;

      const handleAnswer = (idx) => {
        if (showResult) return;
        setSelected(idx);
        setShowResult(true);

          const newHP = bossHP - 1;
          setBossHP(newHP);

          setBossHit(true);
          setTimeout(()=>setBossHit(false),300);
          setShowXPPop('+Hit!');
          setTimeout(()=>setShowXPPop(null),800);
          if (newHP <= 0) setTimeout(()=>setPhase('victory'),800);
        } else {
          setWrongCount(w=>w+1);
        }
      };

      const handleNext = () => {
        setSelected(null);
        setShowResult(false);
        if (qIdx < totalQ - 1) setQIdx(i=>i+1);
        else if (bossHP > 0) setPhase('defeat');
      };

      if (phase === 'intro') {
        return (
          <div className="anim-fade p-6 max-w-xl mx-auto text-center mt-12">
            <div className="text-6xl mb-4 anim-float">{"\u{1F409}"}</div>
            <h2 className="font-medieval text-3xl text-red-400 mb-2">Boss Battle!</h2>
            <h3 className="font-medieval text-xl text-yellow-400 mb-2">{zone.bossName}</h3>
            <p className="text-gray-400 mb-4">This beast guards the exit of {zone.name}. Answer questions to deal damage!</p>
            <div className="card-dark p-4 mb-6">
              <div className="flex items-center justify-between mb-2">
                <span className="text-red-400 font-medieval text-sm flex items-center gap-1"><Icon name="Heart" size={14} /> Boss HP</span>
                <span className="font-mono text-xs text-gray-400">{zone.bossHP}/{zone.bossHP}</span>
              </div>
              <div className="hp-bar"><div className="hp-fill" style={{width:'100%',background:'linear-gradient(90deg,#ef4444,#dc2626)'}} /></div>
            </div>
            <button className="btn-gold text-lg px-8 py-3" onClick={()=>setPhase('fight')}>{"\u2694\uFE0F"} Begin Battle!</button>
          </div>
        );
      }

      if (phase === 'victory') {
        return (
          <div className="anim-fade p-6 max-w-xl mx-auto text-center mt-12">
            <div className="anim-level-up mb-6"><span className="text-7xl">{"\u{1F480}"}</span></div>
            <h2 className="font-medieval text-3xl text-yellow-400 mb-2">Victory!</h2>
            <p className="text-gray-300 mb-2">{zone.bossName} has been vanquished!</p>
            <p className="text-gray-400 mb-4">Accuracy: {playerScore}/{playerScore+wrongCount} ({Math.round(playerScore/(playerScore+wrongCount)*100)}%)</p>
            <div className="card-dark p-4 mb-6 inline-block"><p className="font-mono text-yellow-400 text-xl">+{XP_BOSS} XP Boss Bonus!</p></div>
            <br/><button className="btn-gold mt-4" onClick={()=>onComplete(XP_BOSS)}>Claim Victory & Return {"\u{1F3C6}"}</button>
          </div>
        );
      }

      if (phase === 'defeat') {
        return (
          <div className="anim-fade p-6 max-w-xl mx-auto text-center mt-12">
            <div className="mb-6"><span className="text-6xl">{"\u{1F624}"}</span></div>
            <h2 className="font-medieval text-2xl text-red-400 mb-2">The Boss Survived!</h2>
            <p className="text-gray-300 mb-4">You dealt {zone.bossHP - bossHP} damage but {zone.bossName} still stands with {bossHP} HP left. Review the quests and try again!</p>
            <button className="btn-gold mt-4" onClick={onBack}>Return to Map</button>
          </div>
        );
      }

      return (
        <div className="anim-fade p-4 max-w-xl mx-auto mt-4">
          {showXPPop && <div className="xp-popup anim-xp font-medieval text-red-400 text-2xl font-bold">{showXPPop}</div>}
          <div className="card-dark p-4 mb-4">
            <div className="flex items-center justify-between mb-2">
              <h3 className="font-medieval text-red-400 flex items-center gap-2"><span className="text-xl">{"\u{1F409}"}</span> {zone.bossName}</h3>
              <span className="font-mono text-xs text-gray-400">Q {qIdx+1}/{totalQ}</span>
            </div>
            <div className="flex items-center gap-2 mb-1">
              <Icon name="Heart" size={14} />
              <div className={`hp-bar flex-1 ${bossHit?'anim-boss-hit':''}`}>
                <div className="hp-fill" style={{width:`${hpPct}%`,background: hpPct>50?'linear-gradient(90deg,#ef4444,#dc2626)': hpPct>25?'linear-gradient(90deg,#f59e0b,#d97706)':'linear-gradient(90deg,#22c55e,#16a34a)'}} />
              </div>
              <span className="font-mono text-xs text-gray-400">{bossHP}/{zone.bossHP}</span>
            </div>
          </div>
          <div className="card-dark p-4 mb-4">
            <p className="text-gray-100 text-lg mb-4">{currentQ.question}</p>
            <div className="space-y-2">
              {currentQ.options.map((opt,i) => {
                let cls = 'option-btn';
                if (showResult) {
                  if (i === currentQ.correct) cls += ' option-correct';
                  else if (i === selected) cls += ' option-wrong';
                }
                return (
                  <button key={i} className={cls} onClick={()=>handleAnswer(i)} disabled={showResult}>
                    <span className="font-mono text-xs text-gray-500 mr-2">{String.fromCharCode(65+i)}.</span>{opt}
                  </button>
                );
              })}
            </div>
          </div>
          {showResult && (
            <div className="anim-slide">
              <div className="p-4 rounded-lg mb-4" style={{borderWidth:1,borderStyle:'solid',borderColor:selected===currentQ.correct?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)',background:selected===currentQ.correct?'rgba(20,80,30,0.3)':'rgba(80,20,20,0.3)'}}>
                <p style={{color:selected===currentQ.correct?'#86efac':'#fca5a5'}}>
                  {selected===currentQ.correct ? '\u2694\uFE0F Direct Hit! ' : '\u{1F6E1}\uFE0F The boss blocked! '}{currentQ.explanation}
                </p>
              </div>
              <button className="btn-gold w-full" onClick={handleNext}>
                {bossHP<=0?'Claim Victory!':qIdx===totalQ-1?'Final Result':'Next Strike \u2694\uFE0F'}
              </button>
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────

    function LevelUpAcademy() {
      const [screen, setScreen] = useState('map');
      const [xp, setXP] = useState(0);
      const [completedQuests, setCompletedQuests] = useState(new Set());
      const [completedBosses, setCompletedBosses] = useState(new Set());
      const [currentZone, setCurrentZone] = useState(null);
      const [currentQuest, setCurrentQuest] = useState(null);
      const [showLevelUp, setShowLevelUp] = useState(false);

      const addXP = useCallback((amount) => {
        setXP(prev => {
          const newXP = prev + amount;
          const oldLvl = getLevel(prev);
          const newLvl = getLevel(newXP);
          if (newLvl > oldLvl) {
            setShowLevelUp(true);
            setTimeout(()=>setShowLevelUp(false), 2500);
          }
          return newXP;
        });
      }, []);

      return (
        <div className="relative" style={{minHeight:'100vh'}}>
          <StarField />
          {showLevelUp && (
            <div className="fixed inset-0 flex items-center justify-center pointer-events-none" style={{zIndex:200,background:'rgba(0,0,0,0.6)'}}>
              <div className="anim-level-up text-center">
                <div className="text-6xl mb-4">{"\u26A1"}</div>
                <h2 className="font-medieval text-4xl text-yellow-400 mb-2">LEVEL UP!</h2>
                <p className="font-medieval text-xl text-yellow-300">You reached Level {getLevel(xp)}!</p>
              </div>
            </div>
          )}
          <TopBar xp={xp} screen={screen} onBack={()=>setScreen('map')} />
          <div className="relative" style={{zIndex:10}}>
            {screen === 'map' && (
              <QuestMap zones={ZONES} completedQuests={completedQuests} completedBosses={completedBosses} xp={xp}
                onSelectQuest={(zone,quest) => { setCurrentZone(zone); setCurrentQuest(quest); setScreen('quest'); }}
                onSelectBoss={(zone) => { setCurrentZone(zone); setScreen('boss'); }} />
            )}
            {screen === 'quest' && currentQuest && (
              <QuestScreen quest={currentQuest} zone={currentZone}
                onComplete={(earned) => { addXP(earned); setCompletedQuests(prev => new Set([...prev, currentQuest.id])); setScreen('map'); }}
                onBack={()=>setScreen('map')} />
            )}
            {screen === 'boss' && currentZone && (
              <BossScreen zone={currentZone}
                onComplete={(earned) => { addXP(earned); setCompletedBosses(prev => new Set([...prev, currentZone.id])); setScreen('map'); }}
                onBack={()=>setScreen('map')} />
            )}
          </div>
        </div>
      );
    }

    // ─── RENDER ──────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LevelUpAcademy />);
  </script>
</body>
</html>
